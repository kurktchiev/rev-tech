# Create via:
#   kubectl create secret generic llm-secrets \
#     --namespace=ai-agents \
#     --from-literal=anthropic-api-key="$ANTHROPIC_API_KEY"
#
# Or apply this file after replacing the placeholder:
apiVersion: v1
kind: Secret
metadata:
  name: llm-secrets
  namespace: ai-agents
type: Opaque
stringData:
  anthropic-api-key: "REPLACE_ME"
