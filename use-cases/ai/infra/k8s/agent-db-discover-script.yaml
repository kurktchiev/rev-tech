apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-db-discover-script
  namespace: ai-agents
data:
  discover-databases.sh: |
    #!/usr/bin/env bash
    # Init container: discover databases via tsh, generate tbot config with database-tunnels
    set -euo pipefail

    TELEPORT_PROXY="${TELEPORT_PROXY:?TELEPORT_PROXY is required}"
    TELEPORT_IDENTITY_FILE="${TELEPORT_IDENTITY_FILE:-/opt/machine-id/identity/identity}"
    TSH_DB_DISCOVERY_QUERY="${TSH_DB_DISCOVERY_QUERY:-labels[\"env\"] == \"dev\" && labels[\"owner\"] == \"homelab\"}"
    TBOT_INIT_CONFIG="${TBOT_INIT_CONFIG:-/etc/tbot-init/tbot.yaml}"
    TBOT_GENERATED_CONFIG="${TBOT_GENERATED_CONFIG:-/etc/tbot-generated/tbot.yaml}"
    TBOT_JOIN_TOKEN="${TBOT_JOIN_TOKEN:-agent-db-bot-k8s-join}"
    DATABASES_JSON_PATH="${DATABASES_JSON_PATH:-/etc/databases/databases.json}"
    TBOT_STORAGE_DIR="${TBOT_STORAGE_DIR:-/opt/machine-id/storage}"
    TBOT_IDENTITY_DIR="${TBOT_IDENTITY_DIR:-/opt/machine-id/identity}"
    BASE_DB_PORT="${BASE_DB_PORT:-19000}"
    DEFAULT_DB_USER="${DEFAULT_DB_USER:-}"
    DEFAULT_DB_NAME="${DEFAULT_DB_NAME:-}"

    echo "=== Agent-DB Discovery Init Container ==="
    echo "Proxy:    $TELEPORT_PROXY"
    echo "DB Query: $TSH_DB_DISCOVERY_QUERY"
    echo ""

    # --- Phase 1: Start tbot to get an identity ---
    echo "--- Phase 1: Getting Teleport identity ---"
    mkdir -p "$TBOT_STORAGE_DIR" "$TBOT_IDENTITY_DIR"

    tbot start -c "$TBOT_INIT_CONFIG" &
    TBOT_PID=$!

    echo "Waiting for identity..."
    for i in $(seq 1 60); do
      if [ -f "$TELEPORT_IDENTITY_FILE" ]; then
        echo "Identity ready (${i}s)"
        break
      fi
      if ! kill -0 "$TBOT_PID" 2>/dev/null; then
        echo "ERROR: tbot exited unexpectedly"
        exit 1
      fi
      sleep 1
    done

    if [ ! -f "$TELEPORT_IDENTITY_FILE" ]; then
      echo "ERROR: Identity file not found after 60s"
      kill "$TBOT_PID" 2>/dev/null || true
      exit 1
    fi

    # --- Phase 2: Discover databases and generate configs ---
    echo ""
    echo "--- Phase 2: Discovering databases and generating configs ---"

    mkdir -p "$(dirname "$TBOT_GENERATED_CONFIG")" "$(dirname "$DATABASES_JSON_PATH")"

    python3 -c "
    import json, subprocess, sys, os

    dbs_result = subprocess.run(
        ['tsh', 'db', 'ls', '--query=${TSH_DB_DISCOVERY_QUERY}', '--format=json'],
        capture_output=True, text=True
    )
    if dbs_result.returncode != 0:
        print(f'ERROR: tsh db ls failed: {dbs_result.stderr}', file=sys.stderr)
        sys.exit(1)

    dbs = json.loads(dbs_result.stdout)
    default_user = os.environ.get('DEFAULT_DB_USER', '')
    default_name = os.environ.get('DEFAULT_DB_NAME', '')
    db_list = []
    for db in dbs:
        meta = db.get('metadata', {})
        spec = db.get('spec', {})
        labels = meta.get('labels', {})
        name = meta.get('name') or db.get('name')
        if not name:
            continue
        db_list.append({
            'name': name,
            'protocol': spec.get('protocol') or db.get('protocol', ''),
            'username': labels.get('db-user') or default_user,
            'database': labels.get('db-name') or default_name,
        })
    db_list.sort(key=lambda d: d['name'])

    if len(db_list) == 0:
        print('ERROR: No databases matched the query. agent-db requires exactly one.', file=sys.stderr)
        sys.exit(1)
    if len(db_list) > 1:
        names = [d['name'] for d in db_list]
        sep = ', '
        print(f'ERROR: Expected exactly 1 database but found {len(db_list)}: {sep.join(names)}', file=sys.stderr)
        print('Narrow TSH_DB_DISCOVERY_QUERY to match a single database.', file=sys.stderr)
        sys.exit(1)

    db = db_list[0]
    db_name = db['name']
    db_proto = db['protocol']
    print(f'Discovered database: {db_name} ({db_proto})')

    from agents.teleport import TbotConfigBuilder

    builder = TbotConfigBuilder(
        proxy_server='${TELEPORT_PROXY}',
        join_token='${TBOT_JOIN_TOKEN}',
        join_method='kubernetes',
        storage_path='${TBOT_STORAGE_DIR}',
        identity_path='${TBOT_IDENTITY_DIR}',
    )
    builder.add_db_tunnels(db_list, base_port=int('${BASE_DB_PORT}'))

    with open('${TBOT_GENERATED_CONFIG}', 'w') as f:
        f.write(builder.render_tbot_yaml())

    with open('${DATABASES_JSON_PATH}', 'w') as f:
        f.write(builder.render_databases_json())

    print()
    print('Generated tbot config:')
    print(open('${TBOT_GENERATED_CONFIG}').read())
    print('Generated databases.json:')
    print(open('${DATABASES_JSON_PATH}').read())
    "

    # --- Phase 3: Stop tbot ---
    echo ""
    echo "--- Phase 3: Stopping init tbot ---"
    kill "$TBOT_PID" 2>/dev/null || true
    wait "$TBOT_PID" 2>/dev/null || true

    echo ""
    echo "=== Discovery complete ==="
    echo "  tbot config:    $TBOT_GENERATED_CONFIG"
    echo "  databases.json: $DATABASES_JSON_PATH"
