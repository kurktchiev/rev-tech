# uv workspace root — manages all Python sub-projects under use-cases/ai/.
# Each member has its own pyproject.toml and can be developed independently.
#
# Run at this level:
#   uv sync               — install all workspace members
#   uv run --package <name> python -m ...
#
# To add a new member, append its directory to `members` below.

[tool.uv.workspace]
members = [
    "frontend",
    "agents",
    # "orchestrator",  # TODO: add when orchestrator is promoted from untracked
]
